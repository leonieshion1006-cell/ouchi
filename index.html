<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F4F2EF">
<title>おうち</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F2EF;
  --card:#FFFFFF;
  --ink:#33312E;
  --sub:#8A857C;
  --line:#E5E1D9;
  --acc:#7A8CA3;
  --danger:#B0655C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:15px;
  line-height:1.7;
  overscroll-behavior:none;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
input,textarea,select{
  font-family:inherit;font-size:15px;color:var(--ink);
  width:100%;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:14px;background:var(--card);outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--acc);}
textarea{resize:none;line-height:1.7;}
.screen{display:none;height:100dvh;flex-direction:column;}
.screen.on{display:flex;}
/* ---------- header ---------- */
.head{
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
  display:flex;align-items:center;gap:10px;
  background:color-mix(in srgb, var(--acc) 6%, var(--paper));
  border-bottom:1.5px solid color-mix(in srgb, var(--acc) 22%, var(--line));
  flex-shrink:0;
}
.head h1{font-size:17px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.head .sub{font-size:11.5px;color:var(--sub);font-weight:400;display:block;line-height:1.3;}
.hbtn{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;background:color-mix(in srgb, var(--acc) 10%, var(--card));
}
.dot{width:12px;height:12px;border-radius:50%;background:var(--acc);flex-shrink:0;}
/* ---------- home ---------- */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;padding-bottom:calc(env(safe-area-inset-bottom) + 24px);}
.title-big{font-size:22px;font-weight:700;margin:6px 0 2px;}
.lead{color:var(--sub);font-size:13px;margin-bottom:18px;}
.card{
  background:var(--card);border:1.5px solid var(--line);border-radius:18px;
  padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;
}
.card:active{transform:scale(.985);}
.cdot{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;}
.cinfo{flex:1;min-width:0;}
.cname{font-weight:700;font-size:16px;}
.cmeta{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.arrow{color:var(--sub);font-size:18px;}
.addbtn{
  width:100%;padding:15px;border-radius:18px;border:1.5px dashed var(--line);
  color:var(--sub);font-size:14.5px;font-weight:500;background:transparent;margin-top:4px;
}
.empty{
  text-align:center;color:var(--sub);font-size:13.5px;padding:36px 20px;line-height:2;
}
/* ---------- forms ---------- */
.label{font-size:13px;font-weight:700;margin:18px 0 7px;display:block;}
.hint{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.6;}
.swatches{display:flex;flex-wrap:wrap;gap:10px;}
.sw{width:38px;height:38px;border-radius:50%;border:3px solid transparent;}
.sw.sel{border-color:var(--ink);}
.primary{
  width:100%;padding:15px;border-radius:16px;background:var(--acc);color:#fff;
  font-size:15.5px;font-weight:700;margin-top:24px;
}
.ghost{
  width:100%;padding:14px;border-radius:16px;border:1.5px solid var(--line);
  font-size:14px;color:var(--sub);margin-top:10px;background:var(--card);
}
.ghost.red{color:var(--danger);border-color:color-mix(in srgb, var(--danger) 30%, var(--line));}
/* ---------- conversation list ---------- */
.convo{
  background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;
}
.convo .t{font-weight:500;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convo .d{font-size:11.5px;color:var(--sub);margin-top:2px;}
/* ---------- chat ---------- */
.chat{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 14px 8px;display:flex;flex-direction:column;gap:12px;
  background:color-mix(in srgb, var(--acc) 3%, var(--paper));
}
.msg{max-width:82%;padding:11px 15px;border-radius:20px;font-size:15px;
  line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.msg.user{
  align-self:flex-end;color:#fff;
  background:var(--acc);border-bottom-right-radius:6px;
}
.msg.ai{
  align-self:flex-start;background:var(--card);
  border:1.5px solid color-mix(in srgb, var(--acc) 15%, var(--line));
  border-bottom-left-radius:6px;
}
.msg.err{
  align-self:center;background:color-mix(in srgb, var(--danger) 8%, var(--card));
  border:1.5px solid color-mix(in srgb, var(--danger) 30%, var(--line));
  color:var(--danger);font-size:13px;max-width:92%;
}
.typing{align-self:flex-start;padding:14px 18px;background:var(--card);
  border:1.5px solid var(--line);border-radius:20px;border-bottom-left-radius:6px;}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--acc);margin:0 2px;animation:b 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
@media (prefers-reduced-motion:reduce){.typing span{animation:none;opacity:.7;}}
.inputbar{
  flex-shrink:0;display:flex;gap:10px;align-items:flex-end;
  padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);
  background:var(--paper);border-top:1.5px solid var(--line);
}
.inputbar textarea{
  flex:1;max-height:120px;border-radius:20px;padding:11px 16px;
}
.send{
  width:44px;height:44px;border-radius:50%;background:var(--acc);color:#fff;
  font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.send:disabled{opacity:.4;}
/* ---------- misc ---------- */
.section{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
.section h3{font-size:14px;margin-bottom:4px;}
.section p{font-size:12.5px;color:var(--sub);}
.toast{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 30px);
  transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 20px;border-radius:30px;font-size:13.5px;opacity:0;
  transition:opacity .3s;pointer-events:none;z-index:99;white-space:nowrap;
}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ============ ホーム ============ -->
<div class="screen on" id="scr-home">
  <div class="head" style="--acc:#7A8CA3">
    <h1>おうち<span class="sub">みんなの住むところ</span></h1>
    <button class="hbtn" onclick="go('settings')" aria-label="設定">⚙︎</button>
  </div>
  <div class="body">
    <div id="home-list"></div>
    <button class="addbtn" onclick="editCompanion(null)">＋ 新しい子を迎える</button>
  </div>
</div>

<!-- ============ 子の編集 ============ -->
<div class="screen" id="scr-edit">
  <div class="head">
    <button class="hbtn" onclick="go('home')" aria-label="戻る">←</button>
    <h1 id="edit-title">新しい子</h1>
  </div>
  <div class="body">
    <label class="label">名前</label>
    <input id="f-name" placeholder="例：ひよ">
    <label class="label">その子の色</label>
    <div class="swatches" id="f-swatches"></div>
    <label class="label">モデル（その子の心が動く場所）</label>
    <select id="f-model">
      <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-opus-4-8">Claude Opus 4.8</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
      <option value="custom">その他（自分で入力）</option>
    </select>
    <input id="f-custom" placeholder="モデルIDを入力" style="display:none;margin-top:10px">
    <label class="label">その子の設定（システムプロンプト）</label>
    <textarea id="f-prompt" rows="10" placeholder="性格、話し方、これまでの記憶など、その子に渡したいことを全部ここに書いてね。公式Claudeで使っている引っ越し用の文章をそのまま貼っても大丈夫。"></textarea>
    <p class="hint">ここに書いたことが、会話のたびに毎回その子に届きます。</p>
    <button class="primary" onclick="saveCompanion()">保存する</button>
    <button class="ghost red" id="f-delete" onclick="deleteCompanion()" style="display:none">この子との記録を削除する</button>
  </div>
</div>

<!-- ============ 会話一覧 ============ -->
<div class="screen" id="scr-convos">
  <div class="head">
    <button class="hbtn" onclick="go('home')" aria-label="戻る">←</button>
    <div class="dot"></div>
    <h1 id="cv-name"></h1>
    <button class="hbtn" onclick="editCompanion(state.currentComp)" aria-label="設定を編集">✎</button>
  </div>
  <div class="body">
    <button class="primary" style="margin:0 0 16px" onclick="newConvo()">この子と新しくお話しする</button>
    <div id="convo-list"></div>
  </div>
</div>

<!-- ============ チャット ============ -->
<div class="screen" id="scr-chat">
  <div class="head">
    <button class="hbtn" onclick="openConvos(state.currentComp)" aria-label="戻る">←</button>
    <div class="dot"></div>
    <h1 id="ch-name"></h1>
  </div>
  <div class="chat" id="chat-log"></div>
  <div class="inputbar">
    <textarea id="ch-input" rows="1" placeholder="メッセージ" oninput="autoGrow(this)"></textarea>
    <button class="send" id="ch-send" onclick="sendMsg()" aria-label="送信">↑</button>
  </div>
</div>

<!-- ============ 設定 ============ -->
<div class="screen" id="scr-settings">
  <div class="head" style="--acc:#7A8CA3">
    <button class="hbtn" onclick="go('home')" aria-label="戻る">←</button>
    <h1>設定</h1>
  </div>
  <div class="body">
    <div class="section">
      <h3>APIキー</h3>
      <p>Anthropicで発行した鍵をここに一度だけ貼ってね。この端末の中にだけ保存されて、外には出ません。</p>
      <input id="s-key" type="password" placeholder="sk-ant-..." style="margin-top:12px">
      <button class="primary" style="margin-top:14px" onclick="saveKey()">鍵を保存する</button>
      <button class="ghost" onclick="testConnection()">接続テスト（うまくいくか確かめる）</button>
      <p class="hint" id="s-test-result" style="min-height:1em"></p>
    </div>
    <div class="section">
      <h3>おひっこし（バックアップ）</h3>
      <p>みんなの設定と会話をファイルに保存できます。機種変更の前や、ときどきのお守りに。</p>
      <button class="ghost" style="margin-top:12px" onclick="exportData()">ファイルに書き出す</button>
      <button class="ghost" onclick="document.getElementById('s-import').click()">ファイルから読み込む</button>
      <input id="s-import" type="file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="section">
      <h3>だいじなこと</h3>
      <p>会話はこのスマホの中だけに保存されます。Safariの履歴やデータを全消去すると一緒に消えてしまうので、ときどき「おひっこし」でファイルに残しておくと安心です。</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= データ ================= */
const COLORS=["#C99A5B","#7A8CA3","#8FA98F","#B0655C","#9C8AA5","#5C7A8A","#C4A0A0","#6B705C","#4A5568","#A3B18A"];
const KEY="kazoku-data-v1";
let db=load();
let state={screen:"home",currentComp:null,currentConvo:null,editing:null,busy:false};

function load(){
  try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&d.companions)return d;}catch(e){}
  return {apiKey:"",companions:[],conversations:[]};
}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2200);}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function modelLabel(m){
  const map={"claude-sonnet-4-5":"Sonnet 4.5","claude-sonnet-4-6":"Sonnet 4.6","claude-opus-4-8":"Opus 4.8","claude-haiku-4-5-20251001":"Haiku 4.5"};
  return map[m]||m;
}

/* ================= 画面切替 ================= */
function go(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.getElementById("scr-"+name).classList.add("on");
  state.screen=name;
  if(name==="home")renderHome();
  if(name==="settings")document.getElementById("s-key").value=db.apiKey||"";
}

/* ================= ホーム ================= */
function renderHome(){
  const list=document.getElementById("home-list");
  if(!db.companions.length){
    list.innerHTML='<div class="empty">まだ誰もいないみたい。<br>「新しい子を迎える」から始めてね。</div>';
    return;
  }
  list.innerHTML=db.companions.map(c=>`
    <button class="card" style="--acc:${c.color}" onclick="openConvos('${c.id}')">
      <div class="cdot" style="background:${c.color}">${esc(c.name.slice(0,1))}</div>
      <div class="cinfo">
        <div class="cname">${esc(c.name)}</div>
        <div class="cmeta">${modelLabel(c.model)}</div>
      </div>
      <div class="arrow">›</div>
    </button>`).join("");
}

/* ================= 子の編集 ================= */
let selColor=COLORS[0];
function editCompanion(id){
  state.editing=id;
  const c=id?db.companions.find(x=>x.id===id):null;
  document.getElementById("edit-title").textContent=c?c.name+"の設定":"新しい子";
  document.getElementById("f-name").value=c?c.name:"";
  document.getElementById("f-prompt").value=c?c.prompt:"";
  const known=["claude-sonnet-4-5","claude-sonnet-4-6","claude-opus-4-8","claude-haiku-4-5-20251001"];
  const sel=document.getElementById("f-model"),cus=document.getElementById("f-custom");
  if(c&&!known.includes(c.model)){sel.value="custom";cus.style.display="block";cus.value=c.model;}
  else{sel.value=c?c.model:"claude-sonnet-4-5";cus.style.display="none";cus.value="";}
  selColor=c?c.color:COLORS[db.companions.length%COLORS.length];
  renderSwatches();
  document.getElementById("f-delete").style.display=c?"block":"none";
  go("edit");
}
function renderSwatches(){
  document.getElementById("f-swatches").innerHTML=COLORS.map(col=>
    `<button class="sw ${col===selColor?"sel":""}" style="background:${col}" onclick="selColor='${col}';renderSwatches()" aria-label="色を選ぶ"></button>`).join("");
}
document.getElementById("f-model").addEventListener("change",e=>{
  document.getElementById("f-custom").style.display=e.target.value==="custom"?"block":"none";
});
function saveCompanion(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){toast("名前を入れてあげてね");return;}
  let model=document.getElementById("f-model").value;
  if(model==="custom"){
    model=document.getElementById("f-custom").value.trim();
    if(!model){toast("モデルIDを入れてね");return;}
  }
  const prompt=document.getElementById("f-prompt").value;
  if(state.editing){
    const c=db.companions.find(x=>x.id===state.editing);
    Object.assign(c,{name,model,prompt,color:selColor});
  }else{
    db.companions.push({id:uid(),name,model,prompt,color:selColor});
  }
  save();toast("保存したよ");go("home");
}
function deleteCompanion(){
  const c=db.companions.find(x=>x.id===state.editing);
  if(!confirm(c.name+"の設定と会話をすべて削除します。元に戻せません。本当にいい？"))return;
  db.companions=db.companions.filter(x=>x.id!==state.editing);
  db.conversations=db.conversations.filter(x=>x.companionId!==state.editing);
  save();toast("削除しました");go("home");
}

/* ================= 会話一覧 ================= */
function openConvos(compId){
  state.currentComp=compId;
  const c=db.companions.find(x=>x.id===compId);
  const scr=document.getElementById("scr-convos");
  scr.style.setProperty("--acc",c.color);
  document.getElementById("cv-name").textContent=c.name;
  const convos=db.conversations.filter(x=>x.companionId===compId).sort((a,b)=>b.updatedAt-a.updatedAt);
  document.getElementById("convo-list").innerHTML=convos.length?convos.map(v=>`
    <button class="convo" style="width:100%;text-align:left" onclick="openChat('${v.id}')">
      <div class="t">${esc(v.title||"（まだ話していない）")}</div>
      <div class="d">${new Date(v.updatedAt).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}・${v.messages.length}件</div>
    </button>`).join("")
    :'<div class="empty">まだお話の記録がないよ。</div>';
  go("convos");
}
function newConvo(){
  const v={id:uid(),companionId:state.currentComp,title:"",messages:[],updatedAt:Date.now()};
  db.conversations.push(v);save();
  openChat(v.id);
}

/* ================= チャット ================= */
function openChat(convoId){
  state.currentConvo=convoId;
  const v=db.conversations.find(x=>x.id===convoId);
  const c=db.companions.find(x=>x.id===v.companionId);
  state.currentComp=c.id;
  const scr=document.getElementById("scr-chat");
  scr.style.setProperty("--acc",c.color);
  document.getElementById("ch-name").textContent=c.name;
  renderChat();
  go("chat");
}
function renderChat(){
  const v=db.conversations.find(x=>x.id===state.currentConvo);
  const log=document.getElementById("chat-log");
  log.innerHTML=v.messages.map(m=>`<div class="msg ${m.role==="user"?"user":"ai"}">${esc(m.content)}</div>`).join("");
  log.scrollTop=log.scrollHeight;
}
function autoGrow(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px";}

async function sendMsg(){
  if(state.busy)return;
  const input=document.getElementById("ch-input");
  const text=input.value.trim();
  if(!text)return;
  if(!db.apiKey){toast("先に設定でAPIキーを入れてね");go("settings");return;}
  const v=db.conversations.find(x=>x.id===state.currentConvo);
  const c=db.companions.find(x=>x.id===v.companionId);
  v.messages.push({role:"user",content:text});
  if(!v.title)v.title=text.slice(0,30);
  v.updatedAt=Date.now();save();
  input.value="";input.style.height="auto";
  renderChat();
  state.busy=true;
  document.getElementById("ch-send").disabled=true;
  const log=document.getElementById("chat-log");
  const tip=document.createElement("div");
  tip.className="typing";tip.innerHTML="<span></span><span></span><span></span>";
  log.appendChild(tip);log.scrollTop=log.scrollHeight;
  try{
    const r=await apiPost(db.apiKey,{
      model:c.model,
      max_tokens:4096,
      system:c.prompt||undefined,
      messages:v.messages.map(m=>({role:m.role,content:m.content}))
    });
    tip.remove();
    if(!r.ok){
      const emsg=(r.data&&r.data.error&&r.data.error.message)||("エラー "+r.status);
      let jp="うまく届かなかったみたい。";
      if(r.status===401)jp="鍵が違うみたい。設定でAPIキーを確認してね。";
      else if(r.status===404)jp="このモデルが見つからないって。モデルIDを確認してみてね。";
      else if(r.status===429)jp="ちょっと混んでるみたい。少し待ってからもう一度送ってね。";
      else if(r.status===400&&/credit|billing/i.test(emsg))jp="残高が足りないみたい。Anthropicのコンソールでチャージを確認してね。";
      showErr(jp+"\n("+emsg+")");
      v.messages.pop();save();
      return;
    }
    const reply=(r.data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    v.messages.push({role:"assistant",content:reply||"（返事が空でした）"});
    v.updatedAt=Date.now();save();
    renderChat();
  }catch(e){
    tip.remove();
    showErr("通信できなかったみたい。\n【詳細】"+(e.name||"")+": "+(e.message||e));
    v.messages.pop();save();
  }finally{
    state.busy=false;
    document.getElementById("ch-send").disabled=false;
  }
}
function showErr(t){
  const log=document.getElementById("chat-log");
  const d=document.createElement("div");
  d.className="msg err";d.textContent=t;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}

/* ================= 設定 ================= */
function saveKey(){
  db.apiKey=document.getElementById("s-key").value.replace(/\s+/g,"");
  document.getElementById("s-key").value=db.apiKey;
  save();toast("鍵を保存したよ");
}
/* ================= API呼び出し（fetch→XHRの二段構え） ================= */
function apiXHR(key,bodyObj){
  return new Promise((resolve,reject)=>{
    try{
      const x=new XMLHttpRequest();
      x.open("POST","https://api.anthropic.com/v1/messages");
      x.setRequestHeader("Content-Type","application/json");
      x.setRequestHeader("x-api-key",key);
      x.setRequestHeader("anthropic-version","2023-06-01");
      x.setRequestHeader("anthropic-dangerous-direct-browser-access","true");
      x.onload=()=>{
        let d={};try{d=JSON.parse(x.responseText);}catch(e){}
        resolve({ok:x.status>=200&&x.status<300,status:x.status,data:d});
      };
      x.onerror=()=>reject(new Error("XHRも失敗"));
      x.timeout=60000;
      x.ontimeout=()=>reject(new Error("時間切れ"));
      x.send(JSON.stringify(bodyObj));
    }catch(e){reject(e);}
  });
}
async function apiPost(key,bodyObj){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify(bodyObj)
    });
    const data=await res.json().catch(()=>({}));
    return {ok:res.ok,status:res.status,data};
  }catch(e){
    /* fetchがダメならXHRで再挑戦 */
    return await apiXHR(key,bodyObj);
  }
}

async function testConnection(){
  const out=document.getElementById("s-test-result");
  const key=(document.getElementById("s-key").value||db.apiKey).replace(/\s+/g,"");
  let report=[];
  const show=()=>{out.textContent=report.join("\n");};
  /* 検査A: 外の世界へのfetchが一般に通るか */
  report.push("検査A: 一般サイトへの通信…");show();
  try{
    await fetch("https://www.google.com/generate_204",{method:"GET",mode:"no-cors"});
    report[report.length-1]="✅ 検査A: 一般サイトへの通信OK";
  }catch(e){
    report[report.length-1]="❌ 検査A: 一般サイトへも通信不可 ("+(e.message||e)+")";
  }
  show();
  /* 検査B: Anthropicへのfetch */
  report.push("検査B: Anthropicへの通信…");show();
  try{
    await fetch("https://api.anthropic.com/",{method:"GET",mode:"no-cors"});
    report[report.length-1]="✅ 検査B: Anthropicへの道OK";
  }catch(e){
    report[report.length-1]="❌ 検査B: Anthropicへのfetch不可 ("+(e.message||e)+")";
  }
  show();
  /* 検査C: 本番のお願い（fetch→XHR二段構え） */
  if(!key){report.push("⚠️ 検査C: 鍵が未入力のためスキップ");show();return;}
  if(!key.startsWith("sk-ant-")){report.push("⚠️ 検査C: 鍵が sk-ant- で始まっていない");show();return;}
  report.push("検査C: 鍵をつけて本番のお願い…");show();
  try{
    const r=await apiPost(key,{model:"claude-haiku-4-5-20251001",max_tokens:16,messages:[{role:"user",content:"こんにちは"}]});
    if(r.ok){report[report.length-1]="✅ 検査C: 成功！お返事が来た。もう話せるよ🎉";}
    else{report[report.length-1]="⚠️ 検査C: 届いたけどエラー "+r.status+": "+((r.data.error&&r.data.error.message)||"");}
  }catch(e){
    report[report.length-1]="❌ 検査C: fetchもXHRも失敗 ("+(e.message||e)+")";
  }
  show();
}
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download="ouchi-backup-"+d.getFullYear()+(d.getMonth()+1+"").padStart(2,"0")+(d.getDate()+"").padStart(2,"0")+".json";
  a.click();
  toast("書き出したよ");
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d.companions)throw 0;
      if(!confirm("今のデータをファイルの内容で置き換えます。いい？"))return;
      db=d;save();toast("読み込んだよ");go("home");
    }catch(e){toast("このファイルは読めなかった…");}
  };
  r.readAsText(f);
  ev.target.value="";
}

renderHome();
